name: Build and Push Docker images

# Триггер: работа будет запускаться при каждом пуше в ветку 'main'
on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    # Набор разрешений, необходимых для работы с GitHub Packages
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. Вход в GitHub Container Registry
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    # 2. Сборка и публикация образа для бэкенда
    - name: Build and push Backend image
      uses: docker/build-push-action@v5
      with:
        context: ./pc_market_backend
        push: true
        tags: ghcr.io/sarkushev/jango_2/backend:latest

    # 3. Сборка и публикация образа для фронтенда
    - name: Build and push Frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: ghcr.io/sarkushev/jango_2/frontend:latest